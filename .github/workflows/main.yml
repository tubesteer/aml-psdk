name: Compile AML Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Compile dengan Ndk-Build
      run: |
        cd jni
        $ANDROID_NDK_HOME/ndk-build APP_ABI=arm64-v8a

    - name: Upload Hasil Jadi (.so)
      uses: actions/upload-artifact@v4
      with:
        name: VisualMod-64bit
        path: libs/arm64-v8a/*.so
